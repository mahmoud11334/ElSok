<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elsok | السوق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="noback.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600&amp;family=Amiri:wght@400;700&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap');
        body {
            font-family: 'Cairo', system-ui, sans-serif;
            overflow: hidden;
        }
        .heading {
            font-family: 'Amiri', serif;
        }
        .star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 10;
        }
        .glow {
            text-shadow: 0 0 40px rgb(249 115 22 / 0.25);
        }
        .glass {
            background: rgba(12, 12, 18, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(249, 115, 22, 0.15);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center py-16 px-6">
    <canvas id="stars" class="star-canvas"></canvas>
    
    <div class="content max-w-xl mx-auto text-center">
        <div class="mb-14 flex justify-center">
            <div class="w-16 h-16 rounded-2xl border border-orange-600/20 bg-black/40 flex items-center justify-center">
                <i class="text-4xl text-orange-500">✧</i>
            </div>
        </div>

        <h1 class="heading text-5xl md:text-6xl font-medium leading-none tracking-[-2px] mb-10 text-white glow">
            تم اغلاق هذا الموقع نهائيا<br>كــان هذا المـوقع تـابـع لـ QOVOX 
        </h1>

        <div class="glass rounded-3xl p-10 md:p-14 mb-12">
            <p class="text-2xl leading-relaxed text-gray-200 font-light tracking-wide">
                شكراً لحسن التعامل معنا طوال الفترة الماضية
            </p>
            <div class="h-px bg-gradient-to-r from-transparent via-orange-500/30 to-transparent my-8"></div>
            <p class="text-xl text-gray-300 font-light">
                قد نجتمع في المستقبل في أوضاع أفضل إن شاء الله
            </p>
        </div>

        <div class="text-orange-400/90 text-base font-medium tracking-wider">
            نشكركم جميعاً على الثقة والدعم
        </div>

        <div class="mt-20 text-xs text-gray-500/70 tracking-[3px] font-light">
            ٢٠٢٦
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let stars = [];
        let shootingStars = [];
        
        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.6 + 0.5;
                this.speed = Math.random() * 0.012 + 0.006;
                this.opacity = Math.random() * 0.7 + 0.35;
                this.twinkle = Math.random() * Math.PI * 2;
            }
            update() {
                this.twinkle += this.speed;
                this.opacity = 0.35 + Math.sin(this.twinkle) * 0.45;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#f8fafc';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        class ShootingStar {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width * 0.7;
                this.y = Math.random() * (height * 0.35);
                this.length = Math.random() * 65 + 45;
                this.speed = Math.random() * 14 + 18;
                this.angle = Math.PI / 3.8 + Math.random() * 0.5;
                this.opacity = 0.9;
                this.active = true;
            }
            update() {
                if (!this.active) return;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.opacity -= 0.022;
                if (this.opacity <= 0.05 || this.x > width * 1.1 || this.y > height * 1.1) {
                    this.active = false;
                }
            }
            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.strokeStyle = `rgba(251, 146, 60, ${this.opacity * 0.9})`;
                ctx.lineWidth = 1.8;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#fb923c';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.stroke();
                ctx.restore();
            }
        }
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function initStars() {
            stars = [];
            for (let i = 0; i < 180; i++) {
                stars.push(new Star());
            }
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.22)';
            ctx.fillRect(0, 0, width, height);
            
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            shootingStars.forEach((ss, i) => {
                ss.update();
                ss.draw();
                if (!ss.active && Math.random() < 0.012) {
                    shootingStars[i] = new ShootingStar();
                }
            });
            
            if (Math.random() < 0.018 && shootingStars.length < 2) {
                shootingStars.push(new ShootingStar());
            }
            
            requestAnimationFrame(animate);
        }
        
        function init() {
            resize();
            initStars();
            animate();
        }
        
        window.addEventListener('resize', () => {
            resize();
            initStars();
        });
        
        window.onload = init;
    </script>
</body>
</html>
